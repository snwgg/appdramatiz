<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dramatiz &mdash; Perfil</title>
<link rel="stylesheet" href="styles.css">
<style>
.perfil-page{padding-bottom:80px}
.perfil-hero{position:relative;height:160px;overflow:hidden;background:#111}
.perfil-hero img.cover{width:100%;height:100%;object-fit:cover;opacity:0.4}
.perfil-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,var(--black))}
.perfil-info{padding:0 1.25rem;margin-top:-50px;position:relative;z-index:2}
.perfil-avatar-wrap{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:.75rem}
.perfil-avatar{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--black)}
.perfil-actions{display:flex;gap:8px}
.btn-seguir{background:var(--yellow);color:var(--black);border:none;border-radius:50px;padding:.55rem 1.5rem;font-weight:800;font-size:.8rem;letter-spacing:1px;cursor:pointer}
.btn-share{width:36px;height:36px;border-radius:50%;background:var(--dark2);border:1.5px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--white)}
.perfil-name{font-family:"Bebas Neue",sans-serif;font-size:1.8rem;letter-spacing:1px}
.perfil-handle{font-size:.82rem;color:var(--gray);margin-bottom:1rem}
.perfil-stats{display:flex;gap:2rem;margin-bottom:1.5rem}
.stat{text-align:center}
.stat-num{font-family:"Bebas Neue",sans-serif;font-size:1.6rem;letter-spacing:1px;color:var(--yellow)}
.stat-label{font-size:.7rem;color:var(--gray)}
.perfil-chart{display:flex;align-items:flex-end;gap:6px;height:60px;margin-bottom:1.5rem}
.bar{flex:1;background:var(--yellow);border-radius: 10px 4px 0 0;opacity:.7}
.star-row{display:flex;gap:8px;margin-bottom:1.5rem}
.star-btn{font-size:1.5rem;color:#333;cursor:pointer}
.star-btn.active{color:var(--yellow)}
.section-title-sm{font-weight:700;font-size:.95rem;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center}
.section-title-sm a{font-size:.8rem;color:var(--yellow);text-decoration:none}
.poster-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;margin-bottom:1.5rem}
.poster-row::-webkit-scrollbar{display:none}
.poster-item-sm{width:80px;flex-shrink:0}
.poster-item-sm img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:8px;display:block}
.avaliacao-item{display:flex;gap:12px;align-items:center;padding:.75rem 0;border-bottom:1px solid #1a1a1a}
.avaliacao-thumb{width:48px;height:72px;object-fit:cover;border-radius: 10px;flex-shrink:0}
.aval-title{font-weight:700;font-size:.9rem;margin-bottom:2px}
.aval-year{font-size:.75rem;color:var(--gray)}
.aval-stars{color:var(--yellow);font-size:.82rem}
</style>
</head>
<body>
<div class="app-shell">
  <div class="perfil-page">
    <div class="perfil-hero">
      <img class="cover" id="profileCover" src="">
      <div class="perfil-hero-overlay"></div>
    </div>
    <div class="perfil-info">
      <div class="perfil-avatar-wrap">
        <img class="perfil-avatar" src="https://randomuser.me/api/portraits/men/32.jpg" alt="PauloHVC">
        <div class="perfil-actions">
          <button class="btn-seguir" onclick="this.textContent=this.textContent==='Seguir'?'Seguindo':'Seguir'">Seguir</button>
          <button class="btn-share"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg></button>
        </div>
      </div>
      <div class="perfil-name">PauloHVC</div>
      <div class="perfil-handle">paulo_hvc</div>
      <div class="perfil-stats">
        <div class="stat"><div class="stat-num">248</div><div class="stat-label">Assistidos</div></div>
        <div class="stat"><div class="stat-num">67</div><div class="stat-label">Seguidores</div></div>
        <div class="stat"><div class="stat-num">16</div><div class="stat-label">Seguindo</div></div>
      </div>
      <div class="perfil-chart">
        <div class="bar" style="height:30%"></div>
        <div class="bar" style="height:55%"></div>
        <div class="bar" style="height:45%"></div>
        <div class="bar" style="height:80%"></div>
        <div class="bar" style="height:100%"></div>
      </div>
      <div class="star-row">
        <span class="star-btn active">&#9733;</span>
        <span class="star-btn active">&#9733;</span>
        <span class="star-btn active">&#9733;</span>
        <span class="star-btn active">&#9733;</span>
        <span class="star-btn">&#9733;</span>
      </div>
      <div class="section-title-sm"><span>Favoritos</span><a href="#">Ver tudo &#x203A;</a></div>
      <div class="poster-row" id="favoritosRow"></div>
      <div class="section-title-sm"><span>Avaliacoes</span><a href="#">Ver tudo &#x203A;</a></div>
      <div id="avaliacoesRow"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
    </a>
    <a href="busca.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
    </a>
    <a href="feed.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v4l2.5 2.5"/>
      </svg>
    </a>
    <a href="biblioteca.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M5 3a2 2 0 00-2 2v14a2 2 0 002 2h9l7-7V5a2 2 0 00-2-2H5z"/>
        <path d="M16 3v7h7"/>
      </svg>
    </a>
    <a href="perfil.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </a>
  </nav>
</div>
<script>
const TMDB="2dca580c2a14b55200e784d157207b4d";
const IMG="https://image.tmdb.org/t/p/";
fetch("https://api.themoviedb.org/3/movie/top_rated?api_key="+TMDB+"&language=pt-BR").then(r=>r.json()).then(d=>{
  const movies=d.results;
  const cover=movies.find(m=>m.backdrop_path);
  if(cover) document.getElementById("profileCover").src=IMG+"w780"+cover.backdrop_path;
  const favRow=document.getElementById("favoritosRow");
  movies.slice(0,5).forEach(m=>{
    if(!m.poster_path)return;
    const div=document.createElement("div");div.className="poster-item-sm";
    div.innerHTML='<img src="'+IMG+'w185'+m.poster_path+'" alt="'+m.title+'">';
    favRow.appendChild(div);
  });
  const avalRow=document.getElementById("avaliacoesRow");
  movies.slice(0,3).forEach((m,i)=>{
    if(!m.poster_path)return;
    const stars=[5,4,4][i]||4;
    avalRow.innerHTML+='<div class="avaliacao-item"><img class="avaliacao-thumb" src="'+IMG+'w92'+m.poster_path+'" alt="'+m.title+'"><div><div class="aval-title">'+m.title+' ('+(m.release_date||"").split("-")[0]+')</div><div class="aval-stars">'+"&#9733;".repeat(stars)+"&#9734;".repeat(5-stars)+"</div></div></div>";
  });
});
</script>
</body>
</html>
