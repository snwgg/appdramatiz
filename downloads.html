<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dramatiz — Downloads</title>
<link rel="stylesheet" href="styles.css">
<style>
.dl-page{padding:1.25rem 1.25rem 80px}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--white);text-decoration:none;margin-bottom:1.25rem;font-weight:700;font-size:1.1rem}
.back-btn svg{width:22px;height:22px}
.dl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.dl-card{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;background:var(--dark2)}
.dl-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.dl-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 50%)}
.dl-info{position:absolute;bottom:0;left:0;right:0;padding:.75rem}
.dl-title{font-weight:700;font-size:.82rem;margin-bottom:3px}
.dl-size{font-size:.7rem;color:var(--gray)}
.dl-delete{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;cursor:pointer;color:var(--white);display:flex;align-items:center;justify-content:center}
.dl-delete svg{width:14px;height:14px}
</style>
</head>
<body>
<div class="app-shell">
  <div class="dl-page">
    <a href="biblioteca.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      Downloads
    </a>
    <div class="dl-grid" id="dlGrid"></div>
  </div>
</div>
<script>
const TMDB="2dca580c2a14b55200e784d157207b4d";
const IMG="https://image.tmdb.org/t/p/w342";
const sizes=["1.2 GB","876 MB","2.1 GB","540 MB","1.8 GB","920 MB"];
fetch("https://api.themoviedb.org/3/movie/top_rated?api_key="+TMDB+"&language=pt-BR").then(r=>r.json()).then(d=>{
  const grid=document.getElementById("dlGrid");
  d.results.slice(0,6).forEach((m,i)=>{
    if(!m.poster_path)return;
    const div=document.createElement("div");
    div.className="dl-card";
    div.innerHTML='<img src="'+IMG+m.poster_path+'" alt="'+m.title+'"><div class="dl-overlay"></div><div class="dl-info"><div class="dl-title">'+m.title+'</div><div class="dl-size">'+sizes[i]+'</div></div><button class="dl-delete" onclick="this.closest(\'.dl-card\').remove()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>';
    grid.appendChild(div);
  });
});
</script>
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </a>
    <a href="busca.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
    </a>
    <a href="feed.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 2.5"/></svg>
    </a>
    <a href="biblioteca.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 3a2 2 0 00-2 2v14a2 2 0 002 2h9l7-7V5a2 2 0 00-2-2H5z"/><path d="M16 3v7h7"/></svg>
    </a>
    <a href="perfil.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </a>
  </nav>
</body>
</html>
