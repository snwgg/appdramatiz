<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dramatiz</title>
<link rel="stylesheet" href="styles.css">
<style>
.splash {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 2rem 2rem 3.5rem;
  position: relative;
  overflow: hidden;
  background: var(--black);
}
.splash-bg {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  opacity: 0.18;
  z-index: 0;
}
.splash-bg div { background: #1a1a1a; overflow: hidden; border-radius: 10px; }
.splash-bg div img { width: 100%; height: 100%; object-fit: cover; }
.splash-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.6) 50%, var(--black) 80%);
  z-index: 1;
}
.splash-content {
  position: relative;
  z-index: 2;
  width: 100%;
  text-align: center;
}
.splash-logo { margin-bottom: 1.5rem; }
.splash-logo img { width: 80px; height: 80px; }
.splash-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 4px;
  color: var(--yellow);
  margin-bottom: 0.5rem;
}
.splash-tagline {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 0.4rem;
  line-height: 1.3;
}
.splash-sub {
  font-size: 0.85rem;
  color: var(--gray);
  margin-bottom: 2.5rem;
}
.splash-btns { display: flex; flex-direction: column; gap: 0.75rem; }
.splash-privacy {
  margin-top: 1.5rem;
  font-size: 0.75rem;
  color: var(--yellow);
  text-decoration: none;
}
</style>
</head>

<script>
const TMDB = '2dca580c2a14b55200e784d157207b4d';
const IMG = 'https://image.tmdb.org/t/p/w342';
async function loadPosters() {
  try {
    const r = await fetch('https://api.themoviedb.org/3/movie/popular?api_key=' + TMDB + '&language=pt-BR');
    const d = await r.json();
    const grid = document.getElementById('splashBg');
    grid.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const m = d.results[i];
      const div = document.createElement('div');
      if (m && m.poster_path) {
        const img = document.createElement('img');
        img.src = IMG + m.poster_path;
        div.appendChild(img);
      }
      grid.appendChild(div);
    }
  } catch(e) {}
}
loadPosters();
</script>
