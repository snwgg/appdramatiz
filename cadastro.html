<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dramatiz — Criar Conta</title>
<link rel="stylesheet" href="styles.css">
<style>
.auth-page { min-height:100vh; display:flex; flex-direction:column; position:relative; overflow:hidden; }
.auth-bg { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0.12; z-index:0; }
.auth-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(10,10,10,0.5) 0%,var(--black) 45%); z-index:1; }
.auth-content { position:relative; z-index:2; flex:1; display:flex; flex-direction:column; padding:3rem 1.75rem 2rem; }
.auth-logo { text-align:center; margin-bottom:2rem; }
.auth-logo img { width:52px; height:52px; }
.auth-title { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:2px; margin-bottom:2rem; text-align:center; }
.auth-form { display:flex; flex-direction:column; gap:1rem; }
.auth-switch { text-align:center; margin-top:1.5rem; font-size:0.85rem; color:var(--gray); }
.auth-switch a { color:var(--yellow); text-decoration:none; font-weight:700; }
.divider-or { display:flex; align-items:center; gap:12px; margin:1.25rem 0; }
.divider-or::before,.divider-or::after { content:''; flex:1; height:1px; background:#2a2a2a; }
.divider-or span { font-size:0.75rem; color:var(--gray); white-space:nowrap; }
.social-row { display:flex; gap:10px; }
</style>
</head>
<body>

  <div class="auth-page">

<script>
const TMDB = '2dca580c2a14b55200e784d157207b4d';
async function loadBg() {
  try {
    const r = await fetch('https://api.themoviedb.org/3/movie/popular?api_key=' + TMDB + '&language=pt-BR&page=2');
    const d = await r.json();
    const m = d.results.find(x => x.backdrop_path);
    if (m) document.getElementById('authBg').style.backgroundImage = 'url(https://image.tmdb.org/t/p/w780' + m.backdrop_path + ')';
  } catch(e) {}
}
loadBg();
</script>
