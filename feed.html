<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dramatiz — Feed</title>
<link rel="stylesheet" href="styles.css">
<style>
.feed-page { padding:1.25rem 1.25rem 80px; }
.feed-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
.feed-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:2px; }
.feed-tabs { display:flex; gap:0; border-bottom:1px solid #2a2a2a; margin-bottom:1.25rem; }
.feed-tab { flex:1; text-align:center; padding:0.6rem; font-size:0.85rem; font-weight:600; color:var(--gray); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.feed-tab.active { color:var(--yellow); border-bottom-color:var(--yellow); }
.feed-card { background:var(--dark2); border-radius:12px; padding:1rem; margin-bottom:1rem; }
.feed-user { display:flex; align-items:center; gap:10px; margin-bottom:0.75rem; }
.feed-avatar { width:38px; height:38px; border-radius:50%; object-fit:cover; }
.feed-uname { font-weight:700; font-size:0.85rem; }
.feed-uhandle { font-size:0.75rem; color:var(--gray); }
.feed-time { font-size:0.72rem; color:var(--gray); margin-left:auto; }
.feed-movie-row { display:flex; gap:10px; align-items:center; margin-bottom:0.75rem; }
.feed-movie-thumb { width:50px; height:75px; border-radius: 10px; object-fit:cover; flex-shrink:0; }
.feed-movie-info { flex:1; }
.feed-movie-title { font-weight:700; font-size:0.9rem; margin-bottom:3px; }
.feed-movie-year { font-size:0.75rem; color:var(--gray); }
.feed-stars { color:var(--yellow); font-size:0.85rem; margin-bottom:5px; }
.feed-review { font-size:0.82rem; color:rgba(255,255,255,0.7); line-height:1.5; }
.feed-actions { display:flex; align-items:center; gap:16px; margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid #333; }
.feed-action { display:flex; align-items:center; gap:5px; font-size:0.78rem; color:var(--gray); cursor:pointer; transition:color 0.2s; }
.feed-action:hover { color:var(--yellow); }
.feed-action svg { width:16px; height:16px; }
.feed-shared { font-size:0.82rem; color:var(--gray); margin-bottom:0.5rem; }
.feed-list-tag { display:inline-block; background:var(--dark3); border:1px solid #444; border-radius: 10px; padding:4px 12px; font-size:0.8rem; color:var(--yellow); font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<div class="app-shell">
  <div class="feed-page">
    <div class="feed-header">
      <h1 class="feed-title">Feed</h1>
      <a href="usuarios.html" style="color:var(--gray);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      </a>
    </div>
    <div class="feed-tabs">
      <div class="feed-tab active" onclick="switchTab(this,'voce')">Para Você</div>
      <div class="feed-tab" onclick="switchTab(this,'seguindo')">Seguindo</div>
    </div>
    <div id="feedContent"></div>
  </div>
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
    </a>
    <a href="busca.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
    </a>
    <a href="feed.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v4l2.5 2.5"/>
      </svg>
    </a>
    <a href="biblioteca.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M5 3a2 2 0 00-2 2v14a2 2 0 002 2h9l7-7V5a2 2 0 00-2-2H5z"/>
        <path d="M16 3v7h7"/>
      </svg>
    </a>
    <a href="perfil.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </a>
  </nav>
</div>
<script>
const TMDB = '2dca580c2a14b55200e784d157207b4d';
const IMG = 'https://image.tmdb.org/t/p/w92';
const users = [
  {name:'Dedé',handle:'dede',avatar:'https://randomuser.me/api/portraits/men/44.jpg'},
  {name:'Dudu',handle:'dudu',avatar:'https://randomuser.me/api/portraits/men/68.jpg'},
  {name:'GG',handle:'gg',avatar:'https://randomuser.me/api/portraits/men/55.jpg'},
];
const reviews = [
  {stars:4, text:'Uma das cenas de perseguição mais cinematográficas de todas. Daniel Craig dando uma atuação legitimamente icônica como um personagem que foi uma cifra por muito tempo. E...', time:'30min'},
  {stars:5, text:'Uma das séries mais intensas e imprevisíveis que já vi, além do alto nível de violência e dos heróis não serem perfeitos. Mais uma vez, a atuação foi excelente, principalmente dos...', time:'3h'},
  {stars:4, text:'Filme incrível com uma direção absurda. Cada cena é construída com muito cuidado e atenção aos detalhes. Recomendo demais!', time:'1d'},
];

function switchTab(el, tab) {
  document.querySelectorAll('.feed-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

fetch('https://api.themoviedb.org/3/movie/popular?api_key='+TMDB+'&language=pt-BR').then(r=>r.json()).then(d=>{
  const movies = d.results;
  const feed = document.getElementById('feedContent');
  [0,1,2].forEach(i => {
    const u = users[i], m = movies[i+1], rev = reviews[i];
    if(!m) return;
    feed.innerHTML += `
    <div class="feed-card">
      <div class="feed-user">
        <img class="feed-avatar" src="${u.avatar}" alt="${u.name}">
        <div>
          <div class="feed-uname">${u.name}</div>
          <div class="feed-uhandle">avaliou ${m.title}</div>
        </div>
        <span class="feed-time">${rev.time}</span>
      </div>
      <div class="feed-movie-row">
        <img class="feed-movie-thumb" src="${IMG+m.poster_path}" alt="${m.title}">
        <div class="feed-movie-info">
          <div class="feed-movie-title">${m.title}</div>
          <div class="feed-movie-year">${(m.release_date||'').split('-')[0]}</div>
          <div class="feed-stars">${'★'.repeat(rev.stars)}${'☆'.repeat(5-rev.stars)}</div>
        </div>
      </div>
      <p class="feed-review">${rev.text}</p>
      <div class="feed-actions">
        <div class="feed-action" onclick="this.querySelector('span').textContent=parseInt(this.querySelector('span').textContent)+1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
          <span>${Math.floor(Math.random()*80+10)}</span>
        </div>
        <div class="feed-action">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Comentar
        </div>
        <div class="feed-action">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
          Compartilhar
        </div>
      </div>
    </div>`;
  });
});
</script>
</body>
</html>
