<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dramatiz — Episódios</title>
<link rel="stylesheet" href="styles.css">
<style>
.ep-page{padding-bottom:80px}
.ep-hero{position:relative;aspect-ratio:16/9;overflow:hidden;background:#111}
.ep-hero img{width:100%;height:100%;object-fit:cover}
.ep-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.4),var(--black))}
.ep-back{position:absolute;top:1rem;left:1.25rem;z-index:2;color:white;text-decoration:none}
.ep-back svg{width:24px;height:24px}
.ep-body{padding:1rem 1.25rem}
.ep-show-title{font-family:"Bebas Neue",sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:.25rem}
.ep-stars{color:var(--yellow);font-size:.9rem;margin-bottom:.5rem}
.ep-desc{font-size:.82rem;line-height:1.6;color:rgba(255,255,255,.7);margin-bottom:1.25rem}
.season-btn{display:flex;align-items:center;gap:6px;background:var(--yellow);color:var(--black);border:none;border-radius:50px;padding:.5rem 1.2rem;font-weight:800;font-size:.82rem;cursor:pointer;margin-bottom:1.25rem}
.season-btn svg{width:16px;height:16px}
.ep-item{display:flex;align-items:center;gap:12px;padding:.85rem 0;border-bottom:1px solid #1a1a1a;cursor:pointer}
.ep-thumb{width:72px;height:48px;border-radius: 10px;object-fit:cover;flex-shrink:0;background:var(--dark2);position:relative;overflow:hidden}
.ep-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4)}
.ep-play svg{width:20px;height:20px;color:var(--yellow)}
.ep-info{flex:1}
.ep-title{font-weight:700;font-size:.85rem;margin-bottom:3px}
.ep-dur{font-size:.72rem;color:var(--gray)}
.ep-check{color:var(--yellow)}
.ep-check svg{width:18px;height:18px}
.ep-add-btn{width:36px;height:36px;border-radius:50%;background:var(--dark2);border:1.5px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--white);flex-shrink:0}
.ep-add-btn svg{width:16px;height:16px}
</style>
</head>
<body>
<div class="app-shell">
  <div class="ep-page">
    <div class="ep-hero" id="epHero">
      <div class="ep-hero-overlay"></div>
      <a href="filme.html" class="ep-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></a>
    </div>
    <div class="ep-body">
      <div class="ep-show-title" id="epShowTitle">Carregando...</div>
      <div class="ep-stars" id="epStars">★★★★☆</div>
      <p class="ep-desc" id="epDesc"></p>
      <button class="season-btn">
        Temporada 3
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div id="epList"></div>
    </div>
  </div>
</div>
<script>
const TMDB="2dca580c2a14b55200e784d157207b4d";
const IMG="https://image.tmdb.org/t/p/";
const epTitles=["O Pretenso Príncipe das Trevas","Essas Qualidades Todas","Um Par de Tênis","Filho Favorito","A Grande Revelação","O Último Recurso","Noite de Tempestade","Fim do Começo"];
const durations=["41min","40min","42min","42min","38min","45min","43min","50min"];
const watched=[true,true,true,false,false,false,false,false];

fetch("https://api.themoviedb.org/3/tv/popular?api_key="+TMDB+"&language=pt-BR").then(r=>r.json()).then(d=>{
  const show=d.results[0];
  if(!show)return;
  const hero=document.getElementById("epHero");
  if(show.backdrop_path){const img=document.createElement("img");img.src=IMG+"w780"+show.backdrop_path;hero.insertBefore(img,hero.firstChild);}
  document.getElementById("epShowTitle").textContent=show.name||show.original_name;
  const stars=Math.round((show.vote_average||7)/2);
  document.getElementById("epStars").textContent="★".repeat(stars)+"☆".repeat(5-stars);
  document.getElementById("epDesc").textContent=(show.overview||"").substring(0,130)+"...";

  const list=document.getElementById("epList");
  fetch("https://api.themoviedb.org/3/tv/"+show.id+"/season/1?api_key="+TMDB+"&language=pt-BR").then(r=>r.json()).then(s=>{
    const eps=s.episodes||[];
    (eps.length?eps:epTitles.map((_,i)=>({name:epTitles[i],still_path:null}))).slice(0,8).forEach((ep,i)=>{
      const div=document.createElement("div");
      div.className="ep-item";
      div.innerHTML='<div class="ep-thumb">'+(ep.still_path?'<img src="'+IMG+'w185'+ep.still_path+'" style="width:100%;height:100%;object-fit:cover">':'')+'<div class="ep-play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg></div></div><div class="ep-info"><div class="ep-title">T1 Ep. '+(i+1)+': '+(ep.name||epTitles[i])+'</div><div class="ep-dur">'+(ep.runtime?ep.runtime+"min":durations[i])+'</div></div>'+(watched[i]?'<div class="ep-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>':'<button class="ep-add-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>');
      list.appendChild(div);
    });
  }).catch(()=>{
    epTitles.forEach((title,i)=>{
      const div=document.createElement("div");div.className="ep-item";
      div.innerHTML='<div class="ep-thumb"><div class="ep-play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg></div></div><div class="ep-info"><div class="ep-title">T1 Ep. '+(i+1)+': '+title+'</div><div class="ep-dur">'+durations[i]+'</div></div>'+(watched[i]?'<div class="ep-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>':'<button class="ep-add-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>');
      list.appendChild(div);
    });
  });
});
</script>
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </a>
    <a href="busca.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
    </a>
    <a href="feed.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 2.5"/></svg>
    </a>
    <a href="biblioteca.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 3a2 2 0 00-2 2v14a2 2 0 002 2h9l7-7V5a2 2 0 00-2-2H5z"/><path d="M16 3v7h7"/></svg>
    </a>
    <a href="perfil.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </a>
  </nav>
</body>
</html>
