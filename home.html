<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dramatiz — Home</title>
<link rel="stylesheet" href="styles.css">
<style>
.home-page { padding-bottom: 80px; }
.hero-banner {
  width:100%; aspect-ratio:9/13; position:relative; overflow:hidden;
  background:#111;
}
.hero-banner img { width:100%; height:100%; object-fit:cover; display:block; }
.hero-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to bottom, transparent 30%, rgba(10,10,10,0.7) 65%, var(--black) 100%);
}
.hero-top-bar {
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem 1.25rem;
  z-index:2;
}
.hero-logo { display:flex; align-items:center; gap:8px; }
.hero-logo img { width:28px; height:28px; }
.hero-brand { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:3px; color:var(--yellow); }
.hero-nav { display:flex; gap:1.25rem; }
.hero-nav a { font-size:0.8rem; font-weight:600; color:rgba(255,255,255,0.65); text-decoration:none; transition:color 0.2s; }
.hero-nav a.active { color:var(--yellow); border-bottom:2px solid var(--yellow); padding-bottom:2px; }
.hero-icons { display:flex; gap:14px; }
.hero-icons a { color:var(--white); }
.hero-icons svg { width:22px; height:22px; }
.hero-info {
  position:absolute; bottom:0; left:0; right:0;
  padding:1.5rem 1.25rem 1.25rem;
  z-index:2;
}
.hero-tags { display:flex; gap:6px; margin-bottom:0.5rem; flex-wrap:wrap; }
.hero-tag-item { font-size:0.72rem; color:rgba(255,255,255,0.65); }
.hero-tag-item:not(:last-child)::after { content:'·'; margin-left:6px; }
.hero-title { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:2px; line-height:1; margin-bottom:0.5rem; }
.hero-desc { font-size:0.8rem; color:rgba(255,255,255,0.7); line-height:1.5; margin-bottom:1rem; }
.hero-btns { display:flex; gap:10px; }
.hero-btn-play {
  flex:1; background:var(--yellow); color:var(--black);
  border:none; border-radius:50px; padding:0.75rem;
  font-family:'Barlow',sans-serif; font-weight:800; font-size:0.8rem;
  letter-spacing:1.5px; text-transform:uppercase; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  text-decoration:none;
}
.hero-btn-list {
  background:rgba(255,255,255,0.1); backdrop-filter:blur(8px);
  border:1.5px solid rgba(255,255,255,0.2); border-radius:50px;
  padding:0.75rem 1.25rem; cursor:pointer; color:var(--white);
  font-size:1rem; display:flex; align-items:center; justify-content:center;
  gap:6px; font-family:'Barlow',sans-serif; font-weight:600; font-size:0.8rem;
}
.dots { display:flex; gap:5px; margin-top:0.75rem; }
.dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.3); }
.dot.active { background:var(--yellow); width:18px; border-radius: 8px; }
.section { padding:1.25rem 1.25rem 0; }
.movie-row { display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; }
.movie-row::-webkit-scrollbar { display:none; }
.movie-poster { width:100px; flex-shrink:0; border-radius:8px; overflow:hidden; cursor:pointer; }
.movie-poster img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; border-radius:8px; }
.movie-backdrop { width:160px; flex-shrink:0; border-radius:8px; overflow:hidden; cursor:pointer; }
.movie-backdrop img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; }
.movie-title-small { font-size:0.72rem; color:rgba(255,255,255,0.7); margin-top:5px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>

<script>
const TMDB = '2dca580c2a14b55200e784d157207b4d';
const IMG = 'https://image.tmdb.org/t/p/';

function toggleList(btn) {
  const added = btn.dataset.added === '1';
  btn.dataset.added = added ? '0' : '1';
  btn.innerHTML = added
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Minha Lista'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6L9 17l-5-5"/></svg> Adicionado';
}

function makePoster(m, link='filme.html') {
  const div = document.createElement('a');
  div.href = link;
  div.className = 'movie-poster';
  div.style.cssText = 'text-decoration:none;display:block;';
  if (m.poster_path) {
    const img = document.createElement('img');
    img.src = IMG + 'w185' + m.poster_path;
    img.alt = m.title || m.name;
    img.loading = 'lazy';
    div.appendChild(img);
  }
  const t = document.createElement('div');
  t.className = 'movie-title-small';
  t.textContent = m.title || m.name;
  div.appendChild(t);
  return div;
}

async function init() {
  try {
    const [pop, trend, action] = await Promise.all([
      fetch(IMG.replace('/t/p/','')+'/3/movie/popular?api_key='+TMDB+'&language=pt-BR').then(r=>r.json()),
      fetch('https://api.themoviedb.org/3/trending/all/week?api_key='+TMDB+'&language=pt-BR').then(r=>r.json()),
      fetch('https://api.themoviedb.org/3/discover/movie?api_key='+TMDB+'&with_genres=28&language=pt-BR').then(r=>r.json()),
    ]);

    const featured = pop.results[0];
    if (featured) {
      const banner = document.getElementById('heroBanner');
      const img = document.createElement('img');
      img.src = IMG + 'w780' + featured.backdrop_path;
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
      banner.insertBefore(img, banner.firstChild);
      document.getElementById('heroTitle').textContent = featured.title;
      document.getElementById('heroDesc').textContent = (featured.overview||'').substring(0,120) + '...';
      const tagsEl = document.getElementById('heroTags');
      ['Popular', 'Destaque'].forEach(t => {
        const s = document.createElement('span');
        s.className = 'hero-tag-item';
        s.textContent = t;
        tagsEl.appendChild(s);
      });
    }

    const popRow = document.getElementById('popularRow');
    pop.results.slice(1,10).forEach(m => popRow.appendChild(makePoster(m)));

    const trendRow = document.getElementById('trendingRow');
    trend.results.slice(0,9).forEach(m => trendRow.appendChild(makePoster(m)));

    const actionRow = document.getElementById('actionRow');
    action.results.slice(0,9).forEach(m => actionRow.appendChild(makePoster(m)));

  } catch(e) { console.error(e); }
}

const TMDB_BASE = 'https://api.themoviedb.org';
const popUrl = TMDB_BASE+'/3/movie/popular?api_key='+TMDB+'&language=pt-BR';
fetch(popUrl).then(r=>r.json()).then(d=>{
  const featured = d.results[0];
  if (featured) {
    const banner = document.getElementById('heroBanner');
    const img = document.createElement('img');
    img.src = IMG + 'w780' + featured.backdrop_path;
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
    banner.insertBefore(img, banner.firstChild);
    document.getElementById('heroTitle').textContent = featured.title;
    document.getElementById('heroDesc').textContent = (featured.overview||'').substring(0,120)+'...';
  }
  const popRow = document.getElementById('popularRow');
  d.results.slice(1,10).forEach(m => popRow.appendChild(makePoster(m)));
});
fetch('https://api.themoviedb.org/3/trending/all/week?api_key='+TMDB+'&language=pt-BR').then(r=>r.json()).then(d=>{
  const row = document.getElementById('trendingRow');
  d.results.slice(0,9).forEach(m => row.appendChild(makePoster(m)));
});
fetch('https://api.themoviedb.org/3/discover/movie?api_key='+TMDB+'&with_genres=28&language=pt-BR').then(r=>r.json()).then(d=>{
  const row = document.getElementById('actionRow');
  d.results.slice(0,9).forEach(m => row.appendChild(makePoster(m)));
});
</script>
