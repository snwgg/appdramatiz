<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dramatiz — Usuários</title>
<link rel="stylesheet" href="styles.css">
<style>
.usuarios-page{padding:1.25rem 1.25rem 80px}
.page-title{font-family:"Bebas Neue",sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:1rem}
.search-bar{position:relative;margin-bottom:1.5rem}
.search-bar svg{position:absolute;left:1rem;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--gray)}
.search-bar input{padding-left:2.75rem}
.user-item{display:flex;align-items:center;gap:12px;padding:.85rem;border-bottom:none;background:var(--dark2);border-radius:14px;margin-bottom:8px}
.user-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0}
.user-info{flex:1}
.user-name{font-weight:700;font-size:.9rem}
.user-handle{font-size:.75rem;color:var(--gray)}
.btn-add{width:32px;height:32px;border-radius:50%;background:var(--dark2);border:1.5px solid #444;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--white);transition:all .2s;flex-shrink:0}
.btn-add:hover,.btn-add.added{border-color:var(--yellow);color:var(--yellow)}
.btn-add svg{width:16px;height:16px}
</style>
</head>
<body>
<div class="app-shell">
  <div class="usuarios-page">
    <h1 class="page-title">Usuários</h1>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" class="input-field" placeholder="Adicione Amigos" id="searchInput">
    </div>
    <div id="userList"></div>
  </div>
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
    </a>
    <a href="busca.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
    </a>
    <a href="feed.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v4l2.5 2.5"/>
      </svg>
    </a>
    <a href="biblioteca.html" class="nav-item ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M5 3a2 2 0 00-2 2v14a2 2 0 002 2h9l7-7V5a2 2 0 00-2-2H5z"/>
        <path d="M16 3v7h7"/>
      </svg>
    </a>
    <a href="perfil.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </a>
  </nav>
</div>
<script>
const users=[
  {name:"Vinii",handle:"prof_vini",img:22},{name:"Emilia",handle:"emilly",img:45},
  {name:"Erick",handle:"octa_box",img:51},{name:"Duda",handle:"charal",img:64},
  {name:"Dedeia",handle:"andria",img:30},{name:"Loló",handle:"lorrandres",img:15},
  {name:"Keke",handle:"keke23",img:8},{name:"Bruno",handle:"brunao",img:70},
  {name:"Larissa",handle:"lari",img:36},{name:"Felipe",handle:"felps",img=55},
];
const list=document.getElementById("userList");
let allUsers=[...users];
function render(arr){
  list.innerHTML="";
  arr.forEach(u=>{
    const div=document.createElement("div");
    div.className="user-item";
    div.innerHTML='<img class="user-avatar" src="https://i.pravatar.cc/100?img='+u.img+'" alt="'+u.name+'"><div class="user-info"><div class="user-name">'+u.name+'</div><div class="user-handle">'+u.handle+'</div></div><button class="btn-add" onclick="toggleAdd(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></button>';
    list.appendChild(div);
  });
}
function toggleAdd(btn){
  btn.classList.toggle("added");
  const added=btn.classList.contains("added");
  btn.innerHTML=added?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>';
}
document.getElementById("searchInput").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  render(allUsers.filter(u=>u.name.toLowerCase().includes(q)||u.handle.toLowerCase().includes(q)));
});
render(allUsers);
</script>
</body>
</html>
